name: Benchmark

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m ruff check .
      - run: python -m pytest

  workflow-lab:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev,crawlee,browser]'
      - run: python -m playwright install chromium --with-deps
      - run: python -m prodkit_browser.jobs.docs_to_rag --fixture benchmarks/fixtures/docs_pages.json
      - run: python -m prodkit_browser.jobs.ecommerce_price_monitor --fixture benchmarks/fixtures/ecommerce_pages.json
      - run: python -m prodkit_browser.jobs.playwright_selector_drift --fixture benchmarks/fixtures/ecommerce_pages.json
      - run: python -m prodkit_browser.jobs.playwright_production_debugger --fixture benchmarks/fixtures/browser_debug_pages.json
      - run: python -m prodkit_browser.jobs.crawlee_docs_to_rag --fixture benchmarks/fixtures/docs_pages.json
      - run: python -m benchmarks.scripts.run_local_benchmark
      - run: python -m benchmarks.scripts.run_provider_stub_benchmark
      - run: python -m benchmarks.scripts.generate_provider_benchmark_template
      - run: python -m benchmarks.scripts.generate_provider_evaluation_report
      - run: python -m benchmarks.scripts.generate_cost_per_1k_report
      - run: python -m benchmarks.scripts.run_retrieval_benchmark
      - run: docker build -f infra/docker/Dockerfile .
      - uses: actions/upload-artifact@v4
        with:
          name: workflow-lab-artifacts
          path: |
            artifacts/
            benchmarks/raw/
            benchmarks/reports/
