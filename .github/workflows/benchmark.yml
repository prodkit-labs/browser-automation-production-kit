name: Benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  local-fixture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - run: python -m benchmarks.scripts.run_local_benchmark
